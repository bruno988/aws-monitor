<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Cost Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f1923; color: #fff; padding: 20px; }
    .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #2a3f54; margin-bottom: 30px; }
    .header h1 { color: #FF9900; font-size: 32px; }
    .header p { color: #aaa; margin-top: 8px; }
    .atualizado { color: #666; font-size: 12px; margin-top: 5px; }
    .cards { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .card { flex: 1; min-width: 200px; background: #1a2a3a; border-radius: 12px; padding: 25px; border-left: 4px solid #FF9900; }
    .card .titulo { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 10px; }
    .card .valor { font-size: 36px; font-weight: bold; color: #FF9900; }
    .card .sub { font-size: 12px; color: #666; margin-top: 5px; }
    .status-ok { border-left-color: #28a745; }
    .status-ok .valor { color: #28a745; }
    .status-alerta { border-left-color: #dc3545; }
    .status-alerta .valor { color: #dc3545; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .box { background: #1a2a3a; border-radius: 12px; padding: 25px; }
    .box h3 { color: #FF9900; margin-bottom: 20px; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { color: #FF9900; text-align: left; padding: 10px; border-bottom: 1px solid #2a3f54; font-size: 13px; }
    td { padding: 10px; border-bottom: 1px solid #1a2a3a; font-size: 14px; color: #ccc; }
    tr:hover td { background: #243447; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge.ok { background: #1a3a2a; color: #28a745; }
    .badge.alerta { background: #3a1a1a; color: #dc3545; }
    .loading { text-align: center; padding: 50px; color: #aaa; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="header">
  <h1>☁️ AWS Cost Monitor</h1>
  <p>Monitoramento de custos em tempo real</p>
  <div class="atualizado" id="atualizado">Carregando...</div>
</div>

<div id="conteudo" class="loading">Carregando dados...</div>

<script>
async function carregarDados() {
  try {
    const res = await fetch('data.json?t=' + Date.now())
    const d = await res.json()

    const statusClass = d.valor_mes > d.limite ? 'status-alerta' : 'status-ok'
    const statusTexto = d.valor_mes > d.limite ? '⚠️ Acima do limite' : '✅ Dentro do limite'
    const badgeClass = d.valor_mes > d.limite ? 'alerta' : 'ok'

    document.getElementById('atualizado').textContent = 'Atualizado em: ' + d.atualizado

    let linhasTabela = ''
    if (d.servicos && d.servicos.length > 0) {
      d.servicos.forEach(s => {
        linhasTabela += `<tr><td>${s.nome}</td><td>US$ ${s.valor.toFixed(4)}</td></tr>`
      })
    } else {
      linhasTabela = '<tr><td colspan="2" style="text-align:center;color:#666">Nenhum custo registrado</td></tr>'
    }

    let labelsMeses = []
    let valoresMeses = []
    if (d.historico) {
      d.historico.forEach(h => { labelsMeses.push(h.mes); valoresMeses.push(h.valor) })
    }

    document.getElementById('conteudo').innerHTML = `
      <div class="cards">
        <div class="card">
          <div class="titulo">Custo do Mes</div>
          <div class="valor">US$ ${d.valor_mes.toFixed(4)}</div>
          <div class="sub">desde o dia 01</div>
        </div>
        <div class="card">
          <div class="titulo">Custo de Ontem</div>
          <div class="valor">US$ ${d.valor_dia.toFixed(4)}</div>
          <div class="sub">ultimo dia registrado</div>
        </div>
        <div class="card">
          <div class="titulo">Limite de Alerta</div>
          <div class="valor">US$ ${d.limite.toFixed(2)}</div>
          <div class="sub">configurado</div>
        </div>
        <div class="card ${statusClass}">
          <div class="titulo">Status</div>
          <div class="valor" style="font-size:20px">${statusTexto}</div>
          <div class="sub"><span class="badge ${badgeClass}">${d.valor_mes > d.limite ? 'ALERTA' : 'OK'}</span></div>
        </div>
      </div>

      <div class="grid">
        <div class="box">
          <h3>Custo por Servico</h3>
          <table>
            <tr><th>Servico</th><th>Custo</th></tr>
            ${linhasTabela}
          </table>
        </div>
        <div class="box">
          <h3>Historico Mensal</h3>
          <canvas id="grafico"></canvas>
        </div>
      </div>
    `

    if (labelsMeses.length > 0) {
      new Chart(document.getElementById('grafico'), {
        type: 'bar',
        data: {
          labels: labelsMeses,
          datasets: [{
            label: 'Custo (US$)',
            data: valoresMeses,
            backgroundColor: '#FF9900',
            borderRadius: 6
          }]
        },
        options: {
          plugins: { legend: { labels: { color: '#aaa' } } },
          scales: {
            x: { ticks: { color: '#aaa' }, grid: { color: '#2a3f54' } },
            y: { ticks: { color: '#aaa' }, grid: { color: '#2a3f54' } }
          }
        }
      })
    }

  } catch(e) {
    document.getElementById('conteudo').innerHTML = '<div class="loading">Erro ao carregar dados. Tente novamente.</div>'
  }
}

carregarDados()
setInterval(carregarDados, 60000)
</script>

</body>
</html>
